<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  
  <!-- 1. CORRECTED PWA NAME: My BuildTrack -->
  <title>My BuildTrack - Project & Expense Tracker</title>
  <meta name="description" content="My BuildTrack Progressive Web App for construction and trade expense management." />
  
  <!-- Tailwind CSS CDN for modern PWA styling -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 2. PWA METADATA & MANIFEST LINK -->
  <link rel="manifest" href="site.webmanifest" />
  <meta name="theme-color" content="#0F172A" /> <!-- Dark Navy Navy -->
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="My BuildTrack" />

  <!-- 3. UPDATED LOGO AND ICON REFERENCES -->
  <!-- Crisp SVG Favicon for modern browsers -->
  <link rel="icon" type="image/svg+xml" href="logo.svg" />
  
  <!-- Classic ICO Favicon fallback (32x32) -->
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  
  <!-- Apple Touch Icon (180x180 PNG required for iOS Home Screen) -->
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />

  <style>
    /* Prevent text selection and scrolling during login if necessary */
    body {
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
      background-color: #F8FAFC;
    }
  </style>
</head>

<body class="font-sans antialiased text-slate-900">

  <!-- 4. APP UI HEADER -->
  <header class="sticky top-0 z-50 flex items-center justify-between p-4 bg-slate-950 text-white shadow-lg border-b border-slate-800">
    <div class="flex items-center gap-3">
      <!-- 5. SVG LOGO INTEGRATION -->
      <!-- This references your character logo from image_2.png, which you have as an SVG -->
      <img src="logo.svg" alt="My BuildTrack Logo" class="h-10 w-10 object-contain rounded-full bg-white p-0.5" />
      
      <!-- 6. BRAND NAME (Tailwind styled) -->
      <h1 class="text-xl font-extrabold tracking-tighter text-white">
        My Build<span class="text-yellow-400">Track</span>
      </h1>
    </div>
    
    <!-- Optional UI: Quick Add button -->
    <button class="bg-yellow-400 text-slate-950 font-bold px-4 py-2 rounded-full text-sm hover:bg-yellow-300 shadow-sm transition">
      + New Project
    </button>
  </header>

  <!-- 7. MAIN CONTENT AREA (Placeholder for your PWA dashboard/login) -->
  <main class="p-6 md:p-10 space-y-8">
    <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
      <h2 class="text-2xl font-bold tracking-tight mb-2">Welcome to My BuildTrack</h2>
      <p class="text-slate-600">Your rebranding to <strong class="text-slate-900">My BuildTrack</strong> is successful. This PWA is now ready to manage your construction projects, expenses, and automated calculations.</p>
    </div>
    
    <!-- Add your specific PWA content, Chart.js visualizations, project lists, and scanner UI here -->
  </main>

  <!-- 8. SERVICE WORKER REGISTRATION SCRIPT -->
  <script>
    // Only execute if Service Workers are supported by the browser
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js') // Registers sw.js from the root directory
          .then((registration) => {
            console.log('My BuildTrack Service Worker registered with scope:', registration.scope);
          })
          .catch((error) => {
            console.error('My BuildTrack Service Worker registration failed:', error);
          });
      });
    }
  </script>

</body>
</html>
